pre-commit:
  commands:
    oxlint:
      run: bun run lint
    oxfmt:
      run: bun run fmt:check
    runtime-bundles:
      glob: "{_shared/runtime/src/claude.mjs,**/lib/runtime.mjs}"
      run: bun run check:runtime || { echo "runtime bundles drifted from source — run 'bun run build:runtime' and stage the result"; exit 1; }
    frontmatter:
      glob: "{**/SKILL.md,**/agents/*.md}"
      run: bun run test:meta
